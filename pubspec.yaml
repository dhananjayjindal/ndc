name: ndc
description: "Professional D2C E-commerce Web Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Icons ---
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0          # Essential for the UI redesign we did
  cached_network_image: ^3.4.1  # Better performance for product images
  intl: ^0.20.2                 # For ₹ currency and date formatting

  # --- State Management ---
  provider: ^6.1.5

  # --- Networking & API ---
  dio: ^5.9.0
  googleapis_auth: ^2.0.0
  url_launcher: ^6.3.2

  # --- Media & Storage ---
  youtube_player_flutter: ^9.1.3
  shared_preferences: ^2.5.4
  lucide_icons_flutter: ^3.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0 # Updated to latest stable linting rules

flutter:
  uses-material-design: true

  # Asset management - Keep images in a specific subfolder for better organization
  assets:
    # - assets/images
    - assets/

  # fonts:
  #   - family: NotoSans
  #     fonts:
  #       - asset: fonts/NotoSans-Regular.ttf